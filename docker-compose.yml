services:
  telegram-bot:
    image: tslcat/telegram-bot-tool:latest
    container_name: telegram-bot-tool
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      
      # ==================== 电报 Bot 配置 ====================
      - TELEGRAM_TOKEN=8799734900:AAFnst5G7yhYLXtRxKTMbX8rUeF9EJTjPE8
      - OWNER_CHAT_ID=你的ChatID
      - PUBLIC_BASE_URL=https://你的域名.com
      
      # ==================== WebDAV 备份配置 ====================
      - WEBDAV_URL=https://你的WebDAV地址/remote.php/dav/files/用户名/
      - WEBDAV_USERNAME=你的WebDAV用户名
      - WEBDAV_PASSWORD=你的WebDAV密码
      - BACKUP_INTERVAL_HOURS=24